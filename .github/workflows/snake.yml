name: Snake Cyberpunk

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Snake (Cyberpunk)
        uses: Platane/snk@v3
        with:
          github_user_name: mathbrlima
          outputs: |
            dist/snake.svg
          args: >
            --theme dark
